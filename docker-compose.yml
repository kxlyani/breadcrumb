services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: breadcrumb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: breadcrumb
      POSTGRES_PASSWORD: breadcrumb_secret
      POSTGRES_DB: breadcrumb_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: breadcrumb_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: